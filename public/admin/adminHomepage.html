<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Jewelize</title>
  <link rel="stylesheet" href="../customer/customerstyle.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background-color: #fafafa; }
    .admin-container { text-align: center; padding: 100px 20px; }
    .admin-title { font-size: 2.5em; font-weight: 600; margin-bottom: 10px; color: #333; }
    .admin-subtitle { color: #777; margin-bottom: 50px; font-size: 1.1em; }
    
    .admin-cards {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    
    .admin-card {
      background: white;
      border-radius: 12px;
      padding: 40px 30px;
      width: 250px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-decoration: none;
      color: #333;
    }
    
    .admin-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    
    .admin-card i {
      font-size: 3em;
      color: #d1b4c3; /* Matches customer theme */
      margin-bottom: 20px;
    }
    
    .admin-card h3 {
      font-size: 1.2em;
      font-weight: 600;
    }
    
    .logout-btn {
      color: #e74c3c !important;
      font-weight: 600 !important;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <!-- Use exactly the same logo logic as the homepage -->
      <a href="adminHomepage.html">
        <img src="../images/logo.png" alt="Jewelize Logo" onerror="this.src='https://placehold.co/150x50?text=Jewelize'">
      </a>
    </div>
    <nav class="main-nav">
      <ul>
        <li><a class="logout-btn" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
      </ul>
    </nav>
  </header>

  <section class="admin-container">
    <h1 class="admin-title">Welcome, Admin ✨</h1>
    <p class="admin-subtitle">What would you like to manage today?</p>
    
    <div class="admin-cards">
      <a href="inventory.html" class="admin-card">
        <i class="fa-solid fa-boxes-stacked"></i>
        <h3>Inventory Management</h3>
      </a>
      
      <a href="orders.html" class="admin-card">
        <i class="fa-solid fa-clipboard-list"></i>
        <h3>Order Management</h3>
      </a>
      
      <a href="../index.html" class="admin-card">
        <i class="fa-solid fa-store"></i>
        <h3>View Store</h3>
      </a>
    </div>
  </section>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "../1.loginpage.html";
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "../1.loginpage.html";
    }
  </script>
</body>
</html>
