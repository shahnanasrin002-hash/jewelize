<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Product - Jewelize Admin</title>
  <link rel="stylesheet" href="adminstyle.css">
</head>
<body>
  <header>
    <div class="logo">
      <a href="adminHomepage.html">Jewelize Admin</a>
    </div>
  </header>

  <div class="form-container">
    <h2>Delete Product</h2>
    <form id="deleteProductForm">
      <select required>
        <option value="">Select Product</option>
        <option value="p1">Bow Earring</option>
        <option value="p2">Golden Leaf Ring</option>
      </select>
      <button type="submit">Delete Product</button>
    </form>
  </div>

  <script>
    document.getElementById("deleteProductForm").addEventListener("submit", (e) => {
      e.preventDefault();
      alert("❌ Product deleted successfully!");
      window.location.href = "adminHomepage.html";
    });
  </script>
</body>
</html>
